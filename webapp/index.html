<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAZMA STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --primary-text: #000000;
            --secondary-text: #666666;
            --bg-color: #ffffff;
            --card-bg: #f9f9f9;
            --accent-color: #000000;
            --border-radius: 16px;
            --nav-height: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-text);
            padding-bottom: calc(var(--nav-height) + 20px);
        }

        /* HEADER */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-icon, .search-icon {
            font-size: 24px;
            cursor: pointer;
        }

        .logo {
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .cart-icon-wrapper {
            position: relative;
            cursor: pointer;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff3b30;
            color: white;
            font-size: 10px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        /* SEARCH BAR */
        .search-container {
            padding: 10px 16px;
        }

        .search-input-wrapper {
            background: #f0f0f0;
            border-radius: 12px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-input {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 14px;
            color: var(--primary-text);
            outline: none;
        }

        /* CATEGORY TABS */
        .categories-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 8px 16px 16px;
            scrollbar-width: none; /* Firefox */
        }
        .categories-scroll::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .cat-pill {
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            color: var(--primary-text);
            cursor: pointer;
            transition: all 0.2s;
        }
        .cat-pill.active {
            background: var(--accent-color);
            color: white;
        }

        /* PRODUCT GRID */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 0 16px;
        }

        .product-card {
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
        }

        .image-container {
            width: 100%;
            aspect-ratio: 0.8;
            background-color: #f0f0f0;
            border-radius: var(--border-radius);
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .add-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-size: 20px;
            color: var(--primary-text);
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .add-btn:active {
            transform: scale(0.9);
        }

        .product-info {
            padding: 0 4px;
        }

        .product-title {
            font-size: 13px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 4px;
            color: var(--primary-text);
            /* Limit to 2 lines */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-text);
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--secondary-text);
            font-size: 10px;
            cursor: pointer;
        }
        .nav-item.active {
            color: var(--accent-color);
        }
        .nav-icon {
            font-size: 20px;
        }
        
        /* Video Player Styles */
        .video-container {
            padding: 20px;
            text-align: center;
            color: black;
        }
        
        .main-app {
            display: block;
        }

    </style>
</head>
<body>

    <div id="videoApp" style="display: none;">
        <div class="video-container">
            <h2 style="margin-bottom: 20px;">🎥 Видео о Plazma Water</h2>
            <video id="mainVideo" controls style="width: 100%; max-width: 100%; border-radius: 12px;" autoplay>
                Ваш браузер не поддерживает видео.
            </video>
            <button onclick="window.Telegram.WebApp.close()" style="margin-top: 20px; padding: 12px 24px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 16px;">
                Закрыть
            </button>
        </div>
    </div>

    <div id="shopApp" class="main-app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="menu-icon">☰</div>
            </div>
            <div class="logo">PLAZMA STORE</div>
            <div class="header-right">
                <div class="cart-icon-wrapper">
                    🛒
                    <span class="cart-badge">3</span>
                </div>
            </div>
        </header>

        <!-- Search -->
        <div class="search-container">
            <div class="search-input-wrapper">
                <span>🔍</span>
                <input type="text" class="search-input" placeholder="Поиск товаров...">
            </div>
        </div>

        <!-- Categories -->
        <div class="categories-scroll">
            <div class="cat-pill active">Все</div>
            <div class="cat-pill">Вода</div>
            <div class="cat-pill">Косметика</div>
            <div class="cat-pill">Одежда</div>
            <div class="cat-pill">Аксессуары</div>
        </div>

        <!-- Grid -->
        <div class="product-grid" id="productGrid">
            <!-- Products will be injected here -->
        </div>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <div class="nav-item active">
                <span class="nav-icon">🏠</span>
                <span>Главная</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">🔍</span>
                <span>Каталог</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">👤</span>
                <span>Профиль</span>
            </div>
        </nav>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.enableClosingConfirmation();

        // Check for video param
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('video');
        
        if (videoUrl) {
            document.getElementById('shopApp').style.display = 'none';
            document.getElementById('videoApp').style.display = 'block';
            const videoElement = document.getElementById('mainVideo');
            videoElement.innerHTML = `<source src="${decodeURIComponent(videoUrl)}" type="video/mp4">`;
        } else {
            // Loading Shop
            
            // MOCK DATA matching Prisma schema fields (roughly)
            // Note: No "weight" field included.
            const SAMPLE_PRODUCTS = [
                {
                    id: '1',
                    title: 'Минеральный спрей Siam Botanicals',
                    price: 3640,
                    imageUrl: null, 
                    color: '#e0e0e0'
                },
                {
                    id: '2',
                    title: 'Тоник для чувствительной кожи',
                    price: 6830,
                    imageUrl: null,
                    color: '#f5e6d3'
                },
                {
                    id: '3',
                    title: 'Леггинсы для тренировок Basic',
                    price: 4500,
                    color: '#d3e0f5'
                },
                {
                    id: '4',
                    title: 'Топ спортивный Black',
                    price: 2900,
                    color: '#333333'
                },
                {
                    id: '5',
                    title: 'Бутылка для воды Plazma',
                    price: 1200,
                    color: '#a0e0ff'
                },
                   {
                    id: '6',
                    title: 'Комплекс витаминов Energy',
                    price: 2100,
                    color: '#ffe0a0'
                }
            ];

            function renderGrid(products) {
                const grid = document.getElementById('productGrid');
                grid.innerHTML = products.map(p => {
                    // Formatting price
                    const priceFormatted = new Intl.NumberFormat('ru-RU', { 
                        style: 'currency', 
                        currency: 'RUB', 
                        maximumFractionDigits: 0 
                    }).format(p.price);

                    // Image placeholder or real URL logic
                    const imgContent = p.imageUrl 
                        ? `<img src="${p.imageUrl}" class="product-image" alt="${p.title}">`
                        : `<div style="width:100%; height:100%; background:${p.color || '#eee'}; display:flex; align-items:center; justify-content:center; color:#999; font-size:30px;">🧴</div>`;

                    return `
                        <div class="product-card" onclick="openProduct('${p.id}')">
                            <div class="image-container">
                                ${imgContent}
                                <button class="add-btn" onclick="event.stopPropagation(); addToCart('${p.id}')">+</button>
                            </div>
                            <div class="product-info">
                                <div class="product-price">${priceFormatted}</div>
                                <div class="product-title">${p.title}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // Action handlers
            window.addToCart = function(id) {
                tg.HapticFeedback.impactOccurred('medium');
                // Show popup or animate
                tg.showPopup({
                    title: 'Корзина',
                    message: 'Товар добавлен в корзину',
                    buttons: [{type: 'ok'}]
                });
            };

            window.openProduct = function(id) {
                tg.HapticFeedback.selectionChanged();
                console.log("Opening product", id);
                // Navigate to detail view (future impl)
            };

            // Initialize
            renderGrid(SAMPLE_PRODUCTS);

            // Apply theme colors from Telegram if available, or stick to our White Theme
            // We force White/Light theme to match Forma aesthetic even if user is dark mode, 
            // unless strictly requested to adapt. Forma is light.
            tg.setHeaderColor('#ffffff');
            tg.setBackgroundColor('#ffffff');
        }

    </script>
</body>
</html>
